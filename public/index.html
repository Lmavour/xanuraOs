<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android OS - Home</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
</head>
<body>
    <div class="android-container">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-left">
                <span class="time">12:00</span>
            </div>
            <div class="status-right">
                <span class="battery">100%</span>
                <span class="wifi">📶</span>
            </div>
        </div>

        <!-- Home Screen -->
        <div id="homeScreen" class="screen active">
            <div class="widgets">
                <div class="widget clock-widget">
                    <div class="time-display">12:00</div>
                    <div class="date-display">Senin, 1 Januari 2024</div>
                </div>
            </div>
            
            <div class="app-drawer">
                <div class="app-grid">
                    <!-- Apps will be loaded automatically here -->
                </div>
            </div>
        </div>

        <!-- App Container (dynamically loaded) -->
        <div id="appContainer" class="screen"></div>

        <!-- Navigation Bar -->
        <div class="nav-bar">
            <div class="nav-btn home-btn" data-action="home">
                <div class="nav-icon">🏠</div>
            </div>
            <div class="nav-btn back-btn" data-action="back">
                <div class="nav-icon">⬅️</div>
            </div>
            <div class="nav-btn apps-btn" data-action="apps">
                <div class="nav-icon">⬜</div>
            </div>
        </div>
    </div>

    <script src="/js/auto-app-loader.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
